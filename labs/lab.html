<!DOCTYPE html>
<html lang="es-mx">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laboratorio | TC2005B</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="css/lab.css">
</head>

<body>
    <!-- Top Bar -->
    <header class="top-bar">
        <a href="../index.html" class="brand">TC2005B</a>
        <span class="subtitle">Laboratorio</span>
        <a href="../grupo2-nuevo.html" class="back-link">
            <i class="material-icons" style="font-size:16px">arrow_back</i> Calendario
        </a>
    </header>

    <!-- Main Content -->
    <main class="lab-content" id="labContent">
        <!-- Generated by JS -->
    </main>

    <!-- Prev/Next Navigation -->
    <nav class="prev-next-nav" id="prevNextNav">
        <!-- Generated by JS -->
    </nav>

    <!-- Footer -->
    <footer class="site-footer">
        <div class="footer-content">
            <div class="footer-copyright">
                &copy; 2026 TC2005B &mdash; Construcci&oacute;n de Software y Toma de Decisiones
            </div>
        </div>
    </footer>

    <!-- Load lab index first -->
    <script src="data/lab-index.js"></script>
    <script>
    // Get lab ID from URL query parameter
    function getLabId() {
        var params = new URLSearchParams(window.location.search);
        return params.get("id") || "lab0";
    }

    var currentId = getLabId();

    // Find current lab index in LAB_INDEX
    function getCurrentIndex() {
        for (var i = 0; i < LAB_INDEX.length; i++) {
            if (LAB_INDEX[i].id === currentId) return i;
        }
        return -1;
    }

    // Render prev/next navigation
    function renderPrevNext() {
        var nav = document.getElementById("prevNextNav");
        var idx = getCurrentIndex();
        if (idx === -1) { nav.style.display = "none"; return; }

        var html = "";

        if (idx > 0) {
            var prev = LAB_INDEX[idx - 1];
            var prevLabel = prev.numero !== null ? "Lab " + prev.numero + ": " + prev.titulo : prev.titulo;
            html += '<a href="lab.html?id=' + prev.id + '" class="nav-btn prev">';
            html += '<i class="material-icons">arrow_back</i>';
            html += '<div class="nav-btn-info">';
            html += '<span class="nav-btn-dir">Anterior</span>';
            html += '<span class="nav-btn-title">' + prevLabel + '</span>';
            html += '</div>';
            html += '</a>';
        }

        if (idx < LAB_INDEX.length - 1) {
            var next = LAB_INDEX[idx + 1];
            var nextLabel = next.numero !== null ? "Lab " + next.numero + ": " + next.titulo : next.titulo;
            html += '<a href="lab.html?id=' + next.id + '" class="nav-btn next">';
            html += '<div class="nav-btn-info">';
            html += '<span class="nav-btn-dir">Siguiente</span>';
            html += '<span class="nav-btn-title">' + nextLabel + '</span>';
            html += '</div>';
            html += '<i class="material-icons">arrow_forward</i>';
            html += '</a>';
        }

        nav.innerHTML = html;
    }

    // Render the lab content from the LAB data object
    function renderLab() {
        if (typeof LAB === "undefined") {
            document.getElementById("labContent").innerHTML =
                '<div style="text-align:center;padding:4rem 1rem;">' +
                '<i class="material-icons" style="font-size:48px;color:var(--text-muted)">error_outline</i>' +
                '<p style="margin-top:1rem;color:var(--text-secondary)">No se encontró el laboratorio solicitado.</p>' +
                '</div>';
            return;
        }

        var html = "";

        // Page header
        html += '<div class="lab-header">';
        if (LAB.numero !== null && LAB.numero !== undefined) {
            html += '<div class="lab-number"><i class="material-icons" style="font-size:16px">science</i> Laboratorio ' + LAB.numero + '</div>';
        }
        html += '<h1 class="lab-title">' + LAB.titulo + '</h1>';
        if (LAB.descripcion) {
            html += '<p class="lab-description">' + LAB.descripcion + '</p>';
        }

        // Info badges
        html += '<div class="info-badges">';
        if (LAB.modalidad) {
            html += '<span class="info-badge"><i class="material-icons">group</i> ' + LAB.modalidad + '</span>';
        }
        html += '</div>';
        html += '</div>';

        // Objetivos section
        if (LAB.objetivos && LAB.objetivos.length > 0) {
            html += '<div class="section-card objetivos">';
            html += '<div class="section-icon"><i class="material-icons">flag</i></div>';
            html += '<h2 class="section-title">Objetivos de aprendizaje</h2>';
            html += '<div class="objectives-list">';
            for (var i = 0; i < LAB.objetivos.length; i++) {
                html += '<div class="objective-item">';
                html += '<i class="material-icons">check_circle_outline</i>';
                html += '<span>' + LAB.objetivos[i] + '</span>';
                html += '</div>';
            }
            html += '</div>';
            html += '</div>';
        }

        // Instrucciones section
        if (LAB.instruccionesHtml) {
            html += '<div class="section-card instrucciones">';
            html += '<div class="section-icon"><i class="material-icons">assignment</i></div>';
            html += '<h2 class="section-title">Instrucciones</h2>';
            html += '<div class="instrucciones-html">' + LAB.instruccionesHtml + '</div>';
            html += '</div>';
        }

        // Preguntas section
        if (LAB.preguntas && LAB.preguntas.length > 0) {
            html += '<div class="section-card preguntas">';
            html += '<div class="section-icon"><i class="material-icons">help_outline</i></div>';
            html += '<h2 class="section-title">Preguntas a responder</h2>';
            html += '<div class="preguntas-list">';
            for (var j = 0; j < LAB.preguntas.length; j++) {
                html += '<div class="pregunta-item">';
                html += '<i class="material-icons">quiz</i>';
                html += '<span>' + LAB.preguntas[j] + '</span>';
                html += '</div>';
            }
            html += '</div>';
            html += '</div>';
        }

        // Recursos section
        if (LAB.recursos && LAB.recursos.length > 0) {
            html += '<div class="section-card recursos">';
            html += '<div class="section-icon"><i class="material-icons">link</i></div>';
            html += '<h2 class="section-title">Recursos</h2>';
            html += '<div class="recursos-list">';
            for (var k = 0; k < LAB.recursos.length; k++) {
                var rec = LAB.recursos[k];
                var target = rec.externo ? ' target="_blank"' : '';
                var icon = rec.externo ? 'open_in_new' : 'description';
                html += '<a href="' + rec.url + '"' + target + ' class="recurso-item">';
                html += '<i class="material-icons">' + icon + '</i>';
                html += '<span>' + rec.texto + '</span>';
                html += '</a>';
            }
            html += '</div>';
            html += '</div>';
        }

        // Entrega section
        if (LAB.entrega) {
            html += '<div class="section-card entrega">';
            html += '<div class="section-icon"><i class="material-icons">send</i></div>';
            html += '<h2 class="section-title">Especificaciones de entrega</h2>';
            html += '<div class="entrega-content">' + LAB.entrega + '</div>';
            html += '</div>';
        }

        document.getElementById("labContent").innerHTML = html;
        document.title = (LAB.numero !== null && LAB.numero !== undefined ? "Lab " + LAB.numero + ": " : "") + LAB.titulo + " | TC2005B";
    }

    // Load the data file dynamically
    function loadLabData() {
        var script = document.createElement("script");
        script.src = "data/" + currentId + ".js";
        script.onload = function () {
            renderLab();
            renderPrevNext();
        };
        script.onerror = function () {
            document.getElementById("labContent").innerHTML =
                '<div style="text-align:center;padding:4rem 1rem;">' +
                '<i class="material-icons" style="font-size:48px;color:var(--text-muted)">error_outline</i>' +
                '<p style="margin-top:1rem;color:var(--text-secondary)">No se pudo cargar el laboratorio <strong>' + currentId + '</strong>.</p>' +
                '<a href="lab.html?id=lab0" style="margin-top:0.5rem;display:inline-block;">Ir al Lab 0</a>' +
                '</div>';
        };
        document.body.appendChild(script);
    }

    // Initialize
    loadLabData();
    </script>
</body>

</html>
