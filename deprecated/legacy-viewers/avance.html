<!DOCTYPE html>
<html lang="es-mx">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avance de Proyecto | TC2005B</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="css/avance.css">
</head>

<body>
    <!-- Top Bar -->
    <header class="top-bar">
        <a href="../index.html" class="brand">TC2005B</a>
        <span class="subtitle">Avance de Proyecto</span>
        <a href="../grupo2-nuevo.html" class="back-link">
            <i class="material-icons" style="font-size:16px">arrow_back</i> Calendario
        </a>
    </header>

    <!-- Progress Stepper -->
    <div class="stepper-container">
        <div class="stepper" id="stepper">
            <!-- Generated by JS -->
        </div>
    </div>

    <!-- Main Content -->
    <main class="avance-content" id="avanceContent">
        <!-- Generated by JS -->
    </main>

    <!-- Footer -->
    <footer class="site-footer">
        <div class="footer-content">
            <div class="footer-copyright">
                &copy; 2026 TC2005B &mdash; Construcci&oacute;n de Software y Toma de Decisiones
            </div>
        </div>
    </footer>

    <script>
    // Avance definitions for the stepper navigation
    var AVANCES_NAV = [
        { id: "av1", numero: 1, titulo: "Propuesta de proyecto" },
        { id: "av3", numero: 2, titulo: "Análisis y diseño" },
        { id: "av4", numero: 3, titulo: "Creación de la BD" },
        { id: "av5", numero: 4, titulo: "Prueba de concepto" },
        { id: "av6", numero: 5, titulo: "Versión Beta" },
        { id: "av7", numero: 6, titulo: "Versión 1.0" }
    ];

    // Get avance ID from URL query parameter
    function getAvanceId() {
        var params = new URLSearchParams(window.location.search);
        return params.get("id") || "av1";
    }

    var currentId = getAvanceId();

    // Render the stepper
    function renderStepper() {
        var stepper = document.getElementById("stepper");
        var html = "";
        var currentIndex = AVANCES_NAV.findIndex(function (a) { return a.id === currentId; });
        if (currentIndex === -1) currentIndex = 0;

        for (var i = 0; i < AVANCES_NAV.length; i++) {
            var av = AVANCES_NAV[i];
            var stateClass = "";
            if (i < currentIndex) stateClass = "completed";
            else if (i === currentIndex) stateClass = "active";
            else stateClass = "future";

            html += '<a href="avance.html?id=' + av.id + '" class="step ' + stateClass + '">';
            if (i === currentIndex) {
                html += '<span class="step-circle">' + av.numero + '</span>';
            } else if (i < currentIndex) {
                html += '<span class="step-circle"><i class="material-icons" style="font-size:16px">check</i></span>';
            } else {
                html += '<span class="step-circle">' + av.numero + '</span>';
            }
            html += '<span class="step-label">' + av.titulo + '</span>';
            html += '</a>';

            if (i < AVANCES_NAV.length - 1) {
                var connClass = i < currentIndex ? "completed" : "";
                html += '<div class="step-connector ' + connClass + '"></div>';
            }
        }

        stepper.innerHTML = html;
    }

    // Render the avance content from the AVANCE data object
    function renderAvance() {
        if (typeof AVANCE === "undefined") {
            document.getElementById("avanceContent").innerHTML =
                '<div style="text-align:center;padding:4rem 1rem;">' +
                '<i class="material-icons" style="font-size:48px;color:var(--text-muted)">error_outline</i>' +
                '<p style="margin-top:1rem;color:var(--text-secondary)">No se encontró el avance solicitado.</p>' +
                '</div>';
            return;
        }

        var html = "";

        // Page header
        html += '<div class="avance-header">';
        html += '<div class="avance-number"><i class="material-icons" style="font-size:16px">stars</i> Avance ' + AVANCE.numero + ' de 6</div>';
        html += '<h1 class="avance-title">' + AVANCE.titulo + '</h1>';
        if (AVANCE.descripcion) {
            html += '<p class="avance-description">' + AVANCE.descripcion + '</p>';
        }

        // Info badges
        html += '<div class="info-badges">';
        if (AVANCE.modalidad) {
            html += '<span class="info-badge"><i class="material-icons">group</i> ' + AVANCE.modalidad + '</span>';
        }
        if (AVANCE.fechaEntrega) {
            html += '<span class="info-badge date"><i class="material-icons">event</i> Entrega: ' + AVANCE.fechaEntrega + '</span>';
        }
        if (AVANCE.entrega && AVANCE.entrega.tag) {
            html += '<span class="info-badge tag-badge"><i class="material-icons">sell</i> ' + AVANCE.entrega.tag + '</span>';
        }
        if (AVANCE.entrega && AVANCE.entrega.video) {
            html += '<span class="info-badge warning"><i class="material-icons">videocam</i> Requiere video</span>';
        }
        if (AVANCE.entrega && AVANCE.entrega.coevaluacion) {
            html += '<span class="info-badge warning"><i class="material-icons">rate_review</i> Coevaluación</span>';
        }
        html += '</div>';
        html += '</div>';

        // Objetivos section
        if (AVANCE.objetivos && AVANCE.objetivos.length > 0) {
            html += '<div class="section-card objetivos">';
            html += '<div class="section-icon"><i class="material-icons">flag</i></div>';
            html += '<h2 class="section-title">Objetivos</h2>';
            html += '<div class="objectives-list">';
            for (var i = 0; i < AVANCE.objetivos.length; i++) {
                html += '<div class="objective-item">';
                html += '<i class="material-icons">check_circle_outline</i>';
                html += '<span>' + AVANCE.objetivos[i] + '</span>';
                html += '</div>';
            }
            html += '</div>';
            html += '</div>';
        }

        // Instrucciones section
        if (AVANCE.instrucciones && AVANCE.instrucciones.length > 0) {
            html += '<div class="section-card instrucciones">';
            html += '<div class="section-icon"><i class="material-icons">assignment</i></div>';
            html += '<h2 class="section-title">Instrucciones</h2>';

            for (var j = 0; j < AVANCE.instrucciones.length; j++) {
                var inst = AVANCE.instrucciones[j];

                if (!inst.titulo && !inst.items) {
                    // Plain text instruction (no title, no items)
                    html += '<div class="instruction-plain">' + inst.contenido + '</div>';
                } else {
                    html += '<div class="instruction-item">';
                    if (inst.titulo) {
                        html += '<h3 class="instruction-title">' + inst.titulo + '</h3>';
                    }
                    if (inst.contenido) {
                        html += '<div class="instruction-content">' + inst.contenido + '</div>';
                    }
                    if (inst.items && inst.items.length > 0) {
                        html += '<ul class="instruction-items">';
                        for (var k = 0; k < inst.items.length; k++) {
                            html += '<li>' + inst.items[k] + '</li>';
                        }
                        html += '</ul>';
                    }
                    html += '</div>';
                }
            }

            html += '</div>';
        }

        // Entrega section
        if (AVANCE.entrega) {
            html += '<div class="section-card entrega">';
            html += '<div class="section-icon"><i class="material-icons">send</i></div>';
            html += '<h2 class="section-title">Entrega</h2>';
            html += '<div class="entrega-content">' + AVANCE.entrega.contenido + '</div>';

            var hasExtras = AVANCE.entrega.video || AVANCE.entrega.coevaluacion;
            if (hasExtras) {
                html += '<div class="entrega-extras">';
                if (AVANCE.entrega.video) {
                    html += '<div class="entrega-extra video">';
                    html += '<i class="material-icons">videocam</i>';
                    html += 'Subir video de la presentación al repositorio del equipo';
                    html += '</div>';
                }
                if (AVANCE.entrega.coevaluacion) {
                    html += '<div class="entrega-extra coeval">';
                    html += '<i class="material-icons">rate_review</i>';
                    if (AVANCE.entrega.coevaluacionUrl) {
                        html += 'Llenar formato de <a href="../' + AVANCE.entrega.coevaluacionUrl + '" target="_blank">coevaluación</a> y subirlo al repositorio';
                    } else {
                        html += 'Llenar formato de coevaluación y subirlo al repositorio';
                    }
                    html += '</div>';
                }
                html += '</div>';
            }

            html += '</div>';
        }

        document.getElementById("avanceContent").innerHTML = html;
        document.title = "Avance " + AVANCE.numero + ": " + AVANCE.titulo + " | TC2005B";
    }

    // Load the data file dynamically
    function loadAvanceData() {
        var script = document.createElement("script");
        script.src = "data/" + currentId + ".js";
        script.onload = function () {
            renderAvance();
        };
        script.onerror = function () {
            document.getElementById("avanceContent").innerHTML =
                '<div style="text-align:center;padding:4rem 1rem;">' +
                '<i class="material-icons" style="font-size:48px;color:var(--text-muted)">error_outline</i>' +
                '<p style="margin-top:1rem;color:var(--text-secondary)">No se pudo cargar el avance <strong>' + currentId + '</strong>.</p>' +
                '<a href="avance.html?id=av1" style="margin-top:0.5rem;display:inline-block;">Ir al Avance 1</a>' +
                '</div>';
        };
        document.body.appendChild(script);
    }

    // Initialize
    renderStepper();
    loadAvanceData();
    </script>
</body>

</html>
