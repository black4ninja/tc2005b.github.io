<!DOCTYPE html>
<html lang="es-mx">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendario | TC2005B Construcción de Software</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="css/calendario.css">
</head>

<body>
    <!-- Top Bar -->
    <header class="top-bar">
        <a href="index.html" class="brand">TC2005B</a>
        <span class="subtitle">Construcción de Software y Toma de Decisiones</span>
        <a href="" target="_blank" id="entrevistasLink" class="entrevistas-btn">
            <i class="material-icons">event_available</i>
            <span>Agenda de Entrevistas</span>
        </a>
        <a href="index.html" class="back-link">
            <i class="material-icons" style="font-size:16px">arrow_back</i> Inicio
        </a>
    </header>

    <!-- Sticky Controls: Filter + Week Nav -->
    <div class="sticky-controls">
        <div class="filter-bar">
            <span class="filter-label">Filtrar:</span>
            <button class="filter-pill" data-type="lab" style="--pill-color: var(--color-lab)">
                <i class="material-icons">assignment</i> Labs
            </button>
            <button class="filter-pill" data-type="lectura" style="--pill-color: var(--color-lectura)">
                <i class="material-icons">menu_book</i> Lecturas
            </button>
            <button class="filter-pill" data-type="ejercicio" style="--pill-color: var(--color-ejercicio)">
                <i class="material-icons">edit</i> Ejercicios
            </button>
            <button class="filter-pill" data-type="proyecto" style="--pill-color: var(--color-proyecto)">
                <i class="material-icons">stars</i> Proyecto
            </button>
            <button class="filter-pill" data-type="evaluacion" style="--pill-color: var(--color-evaluacion)">
                <i class="material-icons">check_circle</i> Evaluación
            </button>
            <button class="filter-pill" data-type="trabajo" style="--pill-color: var(--color-trabajo)">
                <i class="material-icons">work</i> Trabajo
            </button>
            <button class="btn-expand-all" id="btnExpandAll">Expandir todo</button>
        </div>
        <nav class="week-nav" id="weekNav">
            <!-- Generated by JS -->
        </nav>
    </div>

    <!-- Calendar Content -->
    <main class="calendar-content" id="calendarContent">
        <!-- Generated by JS -->
    </main>

    <!-- Footer -->
    <footer class="site-footer">
        <div class="footer-content">
            <h3 class="footer-title">Enlaces importantes</h3>
            <div class="footer-links" id="footerLinks">
                <!-- Generated by JS -->
            </div>
            <div class="footer-copyright">
                &copy; 2026 Escuela de Ingeniería y Ciencias - Tecnológico de Monterrey en Querétaro.
            </div>
        </div>
    </footer>

    <!-- Calendar Data -->
    <script src="data/calendario-grupo2.js"></script>

    <!-- Renderer -->
    <script>
    (function () {
        'use strict';

        const ICON_MAP = {
            lab: 'assignment',
            lectura: 'menu_book',
            ejercicio: 'edit',
            proyecto: 'stars',
            evaluacion: 'check_circle',
            break: 'free_breakfast',
            asueto: 'event_busy',
            trabajo: 'work',
            discusion: 'forum',
            info: 'info_outline'
        };

        const DAY_NAMES = {
            lunes: 'Lunes',
            martes: 'Martes',
            miercoles: 'Miércoles',
            jueves: 'Jueves'
        };

        const MONTHS_ES = ['enero', 'febrero', 'marzo', 'abril', 'mayo', 'junio', 'julio', 'agosto', 'septiembre', 'octubre', 'noviembre', 'diciembre'];

        // Use array index as unique ID to avoid duplicates (e.g. two "Tec" weeks)
        function weekId(index) {
            return 'semana-' + index;
        }

        function formatDateRange(start, end) {
            const s = new Date(start + 'T00:00:00');
            const e = new Date(end + 'T00:00:00');
            const sDay = s.getDate();
            const eDay = e.getDate();
            const sMonth = MONTHS_ES[s.getMonth()];
            const eMonth = MONTHS_ES[e.getMonth()];
            if (sMonth === eMonth) {
                return sDay + ' al ' + eDay + ' de ' + sMonth;
            }
            return sDay + ' de ' + sMonth + ' al ' + eDay + ' de ' + eMonth;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function renderActivity(act) {
            const icon = ICON_MAP[act.tipo] || 'info_outline';
            const isLink = act.enlace;
            const target = act.externo ? ' target="_blank"' : '';

            let body = '';
            if (isLink) {
                body += '<a href="' + escapeHtml(act.enlace) + '"' + target + '>' + escapeHtml(act.titulo) + '</a>';
            } else if (act.titulo) {
                body += '<span>' + escapeHtml(act.titulo) + '</span>';
            }

            if (act.descripcion) {
                body += ' <em style="color:var(--text-secondary);font-size:0.75rem">(' + escapeHtml(act.descripcion) + ')</em>';
            }

            if (act.enlacesExtra) {
                const extras = act.enlacesExtra.map(function (e) {
                    const t = e.url && (e.url.startsWith('http') || e.url.startsWith('//')) ? ' target="_blank"' : '';
                    return '<a href="' + escapeHtml(e.url) + '"' + t + '>' + escapeHtml(e.texto) + '</a>';
                }).join(', ');
                body += ' (' + extras + ')';
            }

            const timeBadge = act.duracion ? '<span class="time-badge">' + escapeHtml(act.duracion) + '</span>' : '';
            const entregaBadge = act.fechaEntrega ? '<span class="entrega-badge"><i class="material-icons" style="font-size:12px">event</i> Entrega: ' + escapeHtml(act.fechaEntrega) + '</span>' : '';

            return '<div class="activity" data-type="' + act.tipo + '">' +
                '<i class="material-icons">' + icon + '</i>' +
                '<div class="activity-body">' + body + entregaBadge + '</div>' +
                timeBadge +
                '</div>';
        }

        function renderDay(dayKey, dayData) {
            if (!dayData) return '';

            let html = '<div class="day-column">' +
                '<h3 class="day-name">' + DAY_NAMES[dayKey] + '</h3>';

            if (dayData.nota) {
                html += '<div class="day-note">' + escapeHtml(dayData.nota) + '</div>';
            }

            if (dayData.previo && dayData.previo.length > 0) {
                html += '<div class="pre-session"><div class="pre-session-label">Previo a la sesión</div>';
                dayData.previo.forEach(function (act) { html += renderActivity(act); });
                html += '</div>';
            }

            if (dayData.actividades) {
                html += '<div class="activity-list">';
                dayData.actividades.forEach(function (act) { html += renderActivity(act); });
                html += '</div>';
            }

            html += '</div>';
            return html;
        }

        function countActivitiesByType(semana) {
            const counts = {};
            if (!semana.dias) return counts;
            Object.values(semana.dias).forEach(function (day) {
                if (!day) return;
                const all = (day.previo || []).concat(day.actividades || []);
                all.forEach(function (act) {
                    if (act.tipo !== 'break') {
                        counts[act.tipo] = (counts[act.tipo] || 0) + 1;
                    }
                });
            });
            return counts;
        }

        function renderSummaryChips(counts) {
            const labels = {
                lab: 'Labs', lectura: 'Lecturas', ejercicio: 'Ejercicios',
                proyecto: 'Proyecto', evaluacion: 'Eval', trabajo: 'Trabajo',
                discusion: 'Discusión', info: 'Info'
            };
            const colorVars = {
                lab: 'var(--color-lab)', lectura: 'var(--color-lectura)',
                ejercicio: 'var(--color-ejercicio)', proyecto: 'var(--color-proyecto)',
                evaluacion: 'var(--color-evaluacion)', trabajo: 'var(--color-trabajo)',
                discusion: 'var(--color-discusion)', info: 'var(--color-info)'
            };
            const bgVars = {
                lab: 'var(--color-lab-light)', lectura: 'var(--color-lectura-light)',
                ejercicio: 'var(--color-ejercicio-light)', proyecto: 'var(--color-proyecto-light)',
                evaluacion: 'var(--color-evaluacion-light)', trabajo: 'var(--color-trabajo-light)',
                discusion: 'var(--color-discusion-light)', info: 'var(--color-info-light)'
            };

            return Object.entries(counts)
                .filter(function (pair) { return labels[pair[0]]; })
                .map(function (pair) {
                    return '<span class="summary-chip" style="--chip-bg:' + bgVars[pair[0]] + ';--chip-color:' + colorVars[pair[0]] + '">' + pair[1] + ' ' + labels[pair[0]] + '</span>';
                }).join('');
        }

        function renderWeekCard(semana, index) {
            const id = weekId(index);
            const dateRange = formatDateRange(semana.fechaInicio, semana.fechaFin);
            const isSpecial = semana.tipo === 'especial';
            const weekLabel = semana.titulo || ('Semana ' + semana.numero);
            const numberDisplay = isSpecial ? escapeHtml(String(semana.numero)) : semana.numero;

            if (isSpecial) {
                return '<section class="week-card special-week expanded" id="' + id + '" data-index="' + index + '">' +
                    '<button class="week-header" aria-expanded="true">' +
                        '<div class="week-number">' + numberDisplay + '</div>' +
                        '<div class="week-info">' +
                            '<h2>' + escapeHtml(weekLabel) + '</h2>' +
                            '<span class="week-dates">' + dateRange + '</span>' +
                        '</div>' +
                        '<i class="material-icons chevron">expand_more</i>' +
                    '</button>' +
                    '<div class="week-content"><div class="week-content-inner">' +
                        '<div class="special-content">' +
                            '<i class="material-icons">event_busy</i>' +
                            '<p><strong>' + escapeHtml(semana.mensaje || '') + '</strong></p>' +
                            (semana.mensajeImportante ? '<p style="margin-top:0.5rem;color:var(--color-evaluacion)"><strong>' + escapeHtml(semana.mensajeImportante) + '</strong></p>' : '') +
                        '</div>' +
                    '</div></div>' +
                '</section>';
            }

            const counts = countActivitiesByType(semana);
            const chips = renderSummaryChips(counts);

            let daysHtml = '';
            ['lunes', 'martes', 'miercoles', 'jueves'].forEach(function (day) {
                daysHtml += renderDay(day, semana.dias[day]);
            });

            return '<section class="week-card" id="' + id + '" data-index="' + index + '">' +
                '<button class="week-header" aria-expanded="false">' +
                    '<div class="week-number">' + numberDisplay + '</div>' +
                    '<div class="week-info">' +
                        '<h2>' + escapeHtml(weekLabel) + '</h2>' +
                        '<span class="week-dates">' + dateRange + '</span>' +
                    '</div>' +
                    '<div class="week-summary">' + chips + '</div>' +
                    '<i class="material-icons chevron">expand_more</i>' +
                '</button>' +
                '<div class="week-content"><div class="week-content-inner">' +
                    '<div class="day-grid">' + daysHtml + '</div>' +
                '</div></div>' +
            '</section>';
        }

        // --- Render Calendar ---
        function renderCalendar() {
            const content = document.getElementById('calendarContent');
            const weekNav = document.getElementById('weekNav');

            // Week nav pills — each gets a unique index-based target
            let navHtml = '';
            CALENDARIO.semanas.forEach(function (sem, i) {
                const isSpecial = sem.tipo === 'especial';
                const isMobile = window.innerWidth <= 768;
                const label = sem.titulo ? sem.titulo : (isMobile ? 'S' + sem.numero : 'Sem ' + sem.numero);
                const cls = isSpecial ? 'week-pill special' : 'week-pill';
                navHtml += '<a href="#' + weekId(i) + '" class="' + cls + '" data-index="' + i + '">' + escapeHtml(label) + '</a>';
            });
            weekNav.innerHTML = navHtml;

            // Week cards
            let cardsHtml = '';
            CALENDARIO.semanas.forEach(function (sem, i) { cardsHtml += renderWeekCard(sem, i); });
            content.innerHTML = cardsHtml;

            // Footer links
            document.getElementById('footerLinks').innerHTML =
                '<a href="' + CALENDARIO.enlaces.asesoriaDenisse + '" target="_blank">Solicitud de asesoría Denisse</a>' +
                '<a href="' + CALENDARIO.enlaces.asesoriaAlex + '" target="_blank">Solicitud de asesoría Alex</a>' +
                '<a href="' + CALENDARIO.enlaces.politicasEquipo + '">Políticas de trabajo en equipo</a>' +
                '<a href="' + CALENDARIO.enlaces.integridadMIT + '" target="_blank">Guía de integridad académica del MIT</a>';
        }

        // --- Accordion ---
        function setupAccordion() {
            document.querySelectorAll('.week-header').forEach(function (header) {
                header.addEventListener('click', function () {
                    const card = header.closest('.week-card');
                    const isExpanded = card.classList.contains('expanded');
                    card.classList.toggle('expanded');
                    header.setAttribute('aria-expanded', String(!isExpanded));
                });
            });
        }

        // --- Get total sticky offset ---
        function getStickyOffset() {
            const topBar = document.querySelector('.top-bar');
            const controls = document.querySelector('.sticky-controls');
            return (topBar ? topBar.offsetHeight : 0) + (controls ? controls.offsetHeight : 0);
        }

        // --- Scroll to a card reliably ---
        function scrollToCard(card) {
            const offset = getStickyOffset();
            const targetTop = card.getBoundingClientRect().top + window.scrollY - offset - 8;
            window.scrollTo({ top: Math.max(0, targetTop), behavior: 'smooth' });
        }

        // --- Week Nav & Scroll Spy ---
        function setupWeekNav() {
            const navPills = document.querySelectorAll('.week-pill');
            const cardsArray = Array.from(document.querySelectorAll('.week-card'));
            let currentActiveIndex = -1;
            let userClicked = false;
            let clickTimer = null;
            let ticking = false;

            function setActivePill(index) {
                if (index === currentActiveIndex) return;
                currentActiveIndex = index;
                navPills.forEach(function (p) { p.classList.remove('active'); });
                if (navPills[index]) {
                    navPills[index].classList.add('active');
                    // Keep active pill visible in the nav strip
                    var nav = document.getElementById('weekNav');
                    var pill = navPills[index];
                    var pillLeft = pill.offsetLeft;
                    var pillRight = pillLeft + pill.offsetWidth;
                    var navScroll = nav.scrollLeft;
                    var navWidth = nav.clientWidth;
                    if (pillLeft < navScroll) {
                        nav.scrollLeft = pillLeft - 12;
                    } else if (pillRight > navScroll + navWidth) {
                        nav.scrollLeft = pillRight - navWidth + 12;
                    }
                }
            }

            // Simple scroll-based spy: find the card closest to the top of the
            // visible area (just below sticky headers).
            function onScroll() {
                if (userClicked) return;
                if (ticking) return;
                ticking = true;

                requestAnimationFrame(function () {
                    ticking = false;
                    var offset = getStickyOffset() + 20;
                    var best = -1;
                    var bestDist = Infinity;

                    for (var i = 0; i < cardsArray.length; i++) {
                        var rect = cardsArray[i].getBoundingClientRect();
                        // Card top relative to the sticky boundary
                        var dist = Math.abs(rect.top - offset);
                        // Only consider cards whose top hasn't scrolled far above the viewport
                        if (rect.bottom > offset && dist < bestDist) {
                            bestDist = dist;
                            best = i;
                        }
                    }

                    if (best >= 0) {
                        setActivePill(best);
                    }
                });
            }

            window.addEventListener('scroll', onScroll, { passive: true });
            // Run once on init
            onScroll();

            // Click handler for pills
            navPills.forEach(function (pill, pillIndex) {
                pill.addEventListener('click', function (e) {
                    e.preventDefault();

                    // Immediately activate this pill
                    setActivePill(pillIndex);

                    // Pause scroll spy during animated scroll so it doesn't jitter
                    userClicked = true;
                    clearTimeout(clickTimer);
                    clickTimer = setTimeout(function () { userClicked = false; }, 900);

                    // Find the target card
                    var targetId = pill.getAttribute('href').substring(1);
                    var target = document.getElementById(targetId);
                    if (!target) return;

                    // Auto-expand if collapsed
                    if (!target.classList.contains('expanded')) {
                        target.classList.add('expanded');
                        target.querySelector('.week-header').setAttribute('aria-expanded', 'true');
                    }

                    // Scroll to card
                    scrollToCard(target);
                });
            });
        }

        // --- Filter ---
        function setupFilters() {
            const pills = document.querySelectorAll('.filter-pill');
            const activeFilters = new Set();

            pills.forEach(function (pill) {
                pill.addEventListener('click', function () {
                    const type = pill.dataset.type;
                    if (activeFilters.has(type)) {
                        activeFilters.delete(type);
                        pill.classList.remove('active');
                    } else {
                        activeFilters.add(type);
                        pill.classList.add('active');
                    }

                    const activities = document.querySelectorAll('.activity');
                    if (activeFilters.size === 0) {
                        activities.forEach(function (a) { a.classList.remove('filtered-out'); });
                        return;
                    }
                    activities.forEach(function (a) {
                        var type = a.dataset.type;
                        if (activeFilters.has(type) || type === 'break') {
                            a.classList.remove('filtered-out');
                        } else {
                            a.classList.add('filtered-out');
                        }
                    });
                });
            });
        }

        // --- Expand/Collapse All ---
        function setupExpandAll() {
            const btn = document.getElementById('btnExpandAll');
            let allExpanded = false;

            btn.addEventListener('click', function () {
                allExpanded = !allExpanded;
                document.querySelectorAll('.week-card').forEach(function (card) {
                    if (allExpanded) {
                        card.classList.add('expanded');
                        card.querySelector('.week-header').setAttribute('aria-expanded', 'true');
                    } else {
                        card.classList.remove('expanded');
                        card.querySelector('.week-header').setAttribute('aria-expanded', 'false');
                    }
                });
                btn.textContent = allExpanded ? 'Colapsar todo' : 'Expandir todo';
            });
        }

        // --- Current Week Detection ---
        function highlightCurrentWeek() {
            const today = new Date();
            today.setHours(0, 0, 0, 0);

            let matchIndex = -1;

            // 1) Try to find the week that contains today
            for (var i = 0; i < CALENDARIO.semanas.length; i++) {
                var sem = CALENDARIO.semanas[i];
                var start = new Date(sem.fechaInicio + 'T00:00:00');
                var end = new Date(sem.fechaFin + 'T23:59:59');
                if (today >= start && today <= end) {
                    matchIndex = i;
                    break;
                }
            }

            // 2) If today is between weeks (e.g. weekend gap), find the nearest
            //    upcoming week. If today is past all weeks, pick the last one.
            if (matchIndex === -1) {
                var bestDist = Infinity;
                for (var j = 0; j < CALENDARIO.semanas.length; j++) {
                    var s = new Date(CALENDARIO.semanas[j].fechaInicio + 'T00:00:00');
                    var dist = s.getTime() - today.getTime();
                    // Prefer nearest future week, but accept past if no future exists
                    if (dist >= 0 && dist < bestDist) {
                        bestDist = dist;
                        matchIndex = j;
                    }
                }
                // All weeks are in the past — pick the last one
                if (matchIndex === -1) {
                    matchIndex = CALENDARIO.semanas.length - 1;
                }
            }

            // 3) Highlight and expand the matched week
            var card = document.getElementById(weekId(matchIndex));
            if (card) {
                card.classList.add('current-week', 'expanded');
                card.querySelector('.week-header').setAttribute('aria-expanded', 'true');

                var pill = document.querySelector('.week-pill[data-index="' + matchIndex + '"]');
                if (pill) pill.classList.add('current');

                setTimeout(function () { scrollToCard(card); }, 300);
            }
        }

        // --- Fix sticky positioning ---
        function fixStickyPositions() {
            const topBar = document.querySelector('.top-bar');
            const stickyControls = document.querySelector('.sticky-controls');
            const topBarHeight = topBar.offsetHeight;
            stickyControls.style.top = topBarHeight + 'px';
            const totalStickyHeight = topBarHeight + stickyControls.offsetHeight;
            document.documentElement.style.setProperty('--topbar-height', totalStickyHeight + 'px');
        }

        // --- Entrevistas Button ---
        if (CALENDARIO.enlaces.agendaEntrevistas) {
            document.getElementById('entrevistasLink').href = CALENDARIO.enlaces.agendaEntrevistas;
        } else {
            document.getElementById('entrevistasLink').style.display = 'none';
        }

        // --- Init ---
        renderCalendar();
        fixStickyPositions();
        window.addEventListener('resize', fixStickyPositions);
        setupAccordion();
        setupWeekNav();
        setupFilters();
        setupExpandAll();
        highlightCurrentWeek();
    })();
    </script>
</body>

</html>
